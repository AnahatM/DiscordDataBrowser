<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Discord Data Browser</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #36393f;
        color: #dcddde;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        background: #202225;
        padding: 15px 20px;
        border-bottom: 1px solid #202225;
        display: flex;
        align-items: center;
        gap: 15px;
      }

      header h1 {
        font-size: 18px;
        color: #fff;
      }

      .logo {
        width: 32px;
        height: 32px;
        background: #5865f2;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 16px;
      }

      .main-container {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      .sidebar {
        width: 300px;
        background: #2f3136;
        border-right: 1px solid #202225;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .sidebar-header {
        padding: 15px;
        background: #292b2f;
        border-bottom: 1px solid #202225;
      }

      .sidebar-header h2 {
        font-size: 14px;
        text-transform: uppercase;
        color: #8e9297;
        margin-bottom: 10px;
      }

      .search-box {
        width: 100%;
        padding: 8px 12px;
        background: #202225;
        border: none;
        border-radius: 4px;
        color: #dcddde;
        font-size: 14px;
      }

      .search-box::placeholder {
        color: #72767d;
      }

      .search-box:focus {
        outline: none;
        box-shadow: 0 0 0 2px #5865f2;
      }

      .tabs {
        display: flex;
        border-bottom: 1px solid #202225;
      }

      .tab {
        flex: 1;
        padding: 10px;
        text-align: center;
        cursor: pointer;
        background: #292b2f;
        color: #8e9297;
        font-size: 13px;
        border: none;
        transition: all 0.2s;
      }

      .tab.active {
        background: #2f3136;
        color: #fff;
        border-bottom: 2px solid #5865f2;
      }

      .tab:hover {
        color: #fff;
      }

      .channel-list {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
      }

      .channel-list::-webkit-scrollbar {
        width: 8px;
      }
      .channel-list::-webkit-scrollbar-track {
        background: #2f3136;
      }
      .channel-list::-webkit-scrollbar-thumb {
        background: #202225;
        border-radius: 4px;
      }

      .channel-item {
        padding: 10px 12px;
        margin: 2px 0;
        border-radius: 4px;
        cursor: pointer;
        transition: background 0.15s;
      }

      .channel-item:hover {
        background: #393c43;
      }
      .channel-item.active {
        background: #42464d;
      }

      .channel-name {
        font-size: 14px;
        color: #dcddde;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .channel-icon {
        color: #8e9297;
        font-size: 16px;
      }

      .channel-server {
        font-size: 11px;
        color: #72767d;
        margin-top: 3px;
        margin-left: 24px;
      }

      .dm-badge {
        background: #5865f2;
        color: #fff;
        padding: 2px 6px;
        border-radius: 3px;
        font-size: 10px;
        margin-left: auto;
      }

      .content-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .content-header {
        padding: 15px 20px;
        background: #36393f;
        border-bottom: 1px solid #202225;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .content-header h2 {
        font-size: 16px;
        color: #fff;
      }

      .message-count {
        color: #72767d;
        font-size: 13px;
      }

      .messages-container {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
      }

      .messages-container::-webkit-scrollbar {
        width: 8px;
      }
      .messages-container::-webkit-scrollbar-track {
        background: #36393f;
      }
      .messages-container::-webkit-scrollbar-thumb {
        background: #202225;
        border-radius: 4px;
      }

      .message {
        display: flex;
        padding: 8px 0;
        border-bottom: 1px solid #40444b;
      }

      .message:last-child {
        border-bottom: none;
      }

      .message-avatar {
        width: 40px;
        height: 40px;
        background: #5865f2;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        margin-right: 15px;
        flex-shrink: 0;
      }

      .message-body {
        flex: 1;
        min-width: 0;
      }

      .message-header {
        display: flex;
        align-items: baseline;
        gap: 8px;
        margin-bottom: 4px;
      }

      .message-author {
        font-weight: 600;
        color: #fff;
      }

      .message-timestamp {
        font-size: 12px;
        color: #72767d;
      }

      .message-content {
        color: #dcddde;
        line-height: 1.4;
        word-wrap: break-word;
      }

      .message-attachments {
        margin-top: 8px;
        color: #00aff4;
        font-size: 13px;
      }

      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: #72767d;
        text-align: center;
        padding: 40px;
      }

      .empty-state-icon {
        font-size: 64px;
        margin-bottom: 20px;
      }

      .empty-state h3 {
        font-size: 20px;
        color: #fff;
        margin-bottom: 10px;
      }

      .stats {
        padding: 15px;
        background: #292b2f;
        border-top: 1px solid #202225;
      }

      .stats-row {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: #8e9297;
        margin-bottom: 5px;
      }

      .stats-row:last-child {
        margin-bottom: 0;
      }

      .mention {
        background: #5865f233;
        color: #dee0fc;
        padding: 0 4px;
        border-radius: 3px;
      }

      .loading-spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 2px solid #5865f2;
        border-radius: 50%;
        border-top-color: transparent;
        animation: spin 1s linear infinite;
        margin-right: 10px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .progress-bar {
        width: 100%;
        height: 4px;
        background: #202225;
        border-radius: 2px;
        margin-top: 10px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        background: #5865f2;
        border-radius: 2px;
        transition: width 0.3s ease;
      }

      @media (max-width: 768px) {
        .sidebar {
          width: 250px;
        }
      }

      @media (max-width: 600px) {
        .main-container {
          flex-direction: column;
        }
        .sidebar {
          width: 100%;
          max-height: 40vh;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">💬</div>
      <h1>Discord Data Browser</h1>
    </header>

    <div class="main-container">
      <div class="sidebar">
        <div class="sidebar-header">
          <h2>Channels</h2>
          <input
            type="text"
            class="search-box"
            id="searchBox"
            placeholder="Search channels..."
          />
        </div>

        <div class="tabs">
          <button class="tab active" data-filter="all">All</button>
          <button class="tab" data-filter="server">Servers</button>
          <button class="tab" data-filter="dm">DMs</button>
        </div>

        <div class="channel-list" id="channelList">
          <div class="empty-state">
            <div class="loading-spinner"></div>
            <p>Loading channels...</p>
            <div class="progress-bar">
              <div
                class="progress-fill"
                id="progressFill"
                style="width: 0%"
              ></div>
            </div>
          </div>
        </div>

        <div class="stats" id="stats">
          <div class="stats-row">
            <span>Total Channels:</span>
            <span id="totalChannels">0</span>
          </div>
          <div class="stats-row">
            <span>Total Messages:</span>
            <span id="totalMessages">0</span>
          </div>
        </div>
      </div>

      <div class="content-area">
        <div class="content-header" id="contentHeader" style="display: none">
          <span class="channel-icon" id="channelIcon">#</span>
          <h2 id="currentChannelName">Select a channel</h2>
          <span class="message-count" id="messageCount"></span>
        </div>

        <div class="messages-container" id="messagesContainer">
          <div class="empty-state">
            <div class="empty-state-icon">📨</div>
            <h3>Welcome to Discord Data Browser</h3>
            <p>Select a channel from the sidebar to view your messages</p>
          </div>
        </div>
      </div>
    </div>

    <script>
      let channelsData = {};
      let messagesCache = {};
      let currentFilter = "all";
      let allChannels = [];

      // Load data on page load
      async function init() {
        try {
          // Load the index
          const indexResponse = await fetch("Messages/index.json");
          if (!indexResponse.ok)
            throw new Error("Could not load Messages/index.json");
          channelsData = await indexResponse.json();

          // Process channels
          allChannels = await loadAllChannels();
          renderChannelList(allChannels);
          updateStats();
        } catch (error) {
          console.error("Error loading data:", error);
          document.getElementById("channelList").innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">⚠️</div>
              <h3>Could not load data</h3>
              <p style="margin-top:10px;">Make sure this file is placed in your Discord data export folder and you're running a local server.</p>
              <p style="margin-top:15px;font-size:12px;color:#5865f2;">python -m http.server 8000</p>
            </div>
          `;
        }
      }

      async function loadAllChannels() {
        const channels = [];
        const entries = Object.entries(channelsData);
        let loaded = 0;

        for (const [channelId, channelName] of entries) {
          try {
            const channelResponse = await fetch(
              `Messages/c${channelId}/channel.json`,
            );
            const channelInfo = await channelResponse.json();

            const messagesResponse = await fetch(
              `Messages/c${channelId}/messages.json`,
            );
            const messages = await messagesResponse.json();

            messagesCache[channelId] = messages;

            channels.push({
              id: channelId,
              name: channelInfo.name || channelName.split(" in ")[0],
              displayName: channelName,
              type: channelInfo.type,
              guild: channelInfo.guild,
              recipients: channelInfo.recipients,
              messageCount: messages.length,
              lastMessage: messages.length > 0 ? messages[0].Timestamp : null,
            });
          } catch (e) {
            console.log(`Skipping channel ${channelId}:`, e.message);
          }

          loaded++;
          const progress = Math.round((loaded / entries.length) * 100);
          document.getElementById("progressFill").style.width = `${progress}%`;
        }

        // Sort by last message date (newest first)
        channels.sort((a, b) => {
          if (!a.lastMessage) return 1;
          if (!b.lastMessage) return -1;
          return new Date(b.lastMessage) - new Date(a.lastMessage);
        });

        return channels;
      }

      function renderChannelList(channels) {
        const filteredChannels = channels.filter((ch) => {
          if (currentFilter === "dm") return ch.type === "DM";
          if (currentFilter === "server") return ch.type !== "DM";
          return true;
        });

        const searchTerm = document
          .getElementById("searchBox")
          .value.toLowerCase();
        const searchFiltered = filteredChannels.filter((ch) =>
          ch.displayName.toLowerCase().includes(searchTerm),
        );

        const listHtml = searchFiltered
          .map((ch) => {
            const icon = ch.type === "DM" ? "@" : "#";
            const serverName = ch.guild
              ? ch.guild.name
              : ch.type === "DM"
                ? "Direct Message"
                : "";
            const badge =
              ch.type === "DM" ? '<span class="dm-badge">DM</span>' : "";

            return `
              <div class="channel-item" data-id="${ch.id}" onclick="selectChannel('${ch.id}')">
                <div class="channel-name">
                  <span class="channel-icon">${icon}</span>
                  <span>${escapeHtml(ch.name || "Unknown")}</span>
                  ${badge}
                </div>
                <div class="channel-server">${escapeHtml(serverName)} • ${ch.messageCount} messages</div>
              </div>
            `;
          })
          .join("");

        document.getElementById("channelList").innerHTML =
          listHtml || '<div class="empty-state"><p>No channels found</p></div>';
      }

      function selectChannel(channelId) {
        document
          .querySelectorAll(".channel-item")
          .forEach((el) => el.classList.remove("active"));
        document
          .querySelector(`.channel-item[data-id="${channelId}"]`)
          ?.classList.add("active");

        const channel = allChannels.find((ch) => ch.id === channelId);
        const messages = messagesCache[channelId] || [];

        document.getElementById("contentHeader").style.display = "flex";
        document.getElementById("channelIcon").textContent =
          channel?.type === "DM" ? "@" : "#";
        document.getElementById("currentChannelName").textContent =
          channel?.displayName || "Unknown Channel";
        document.getElementById("messageCount").textContent =
          `${messages.length} messages`;

        renderMessages(messages);
      }

      function renderMessages(messages) {
        if (messages.length === 0) {
          document.getElementById("messagesContainer").innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">💬</div>
              <h3>No messages</h3>
              <p>This channel has no messages</p>
            </div>
          `;
          return;
        }

        // Sort messages oldest to newest for display
        const sortedMessages = [...messages].sort(
          (a, b) => new Date(a.Timestamp) - new Date(b.Timestamp),
        );

        const messagesHtml = sortedMessages
          .map((msg) => {
            const timestamp = formatTimestamp(msg.Timestamp);
            const content = formatContent(msg.Contents);
            const attachments = msg.Attachments
              ? `<div class="message-attachments">📎 ${escapeHtml(msg.Attachments)}</div>`
              : "";

            return `
              <div class="message">
                <div class="message-avatar">U</div>
                <div class="message-body">
                  <div class="message-header">
                    <span class="message-author">You</span>
                    <span class="message-timestamp">${timestamp}</span>
                  </div>
                  <div class="message-content">${content}</div>
                  ${attachments}
                </div>
              </div>
            `;
          })
          .join("");

        document.getElementById("messagesContainer").innerHTML = messagesHtml;

        // Scroll to bottom
        const container = document.getElementById("messagesContainer");
        container.scrollTop = container.scrollHeight;
      }

      function formatTimestamp(timestamp) {
        const date = new Date(timestamp);
        return date.toLocaleDateString("en-US", {
          month: "short",
          day: "numeric",
          year: "numeric",
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      function formatContent(content) {
        if (!content) return '<em style="color:#72767d;">No content</em>';

        let formatted = escapeHtml(content);

        // Format mentions
        formatted = formatted.replace(
          /&lt;@!?(\d+)&gt;/g,
          '<span class="mention">@user</span>',
        );
        formatted = formatted.replace(
          /&lt;#(\d+)&gt;/g,
          '<span class="mention">#channel</span>',
        );

        // Format URLs
        formatted = formatted.replace(
          /(https?:\/\/[^\s]+)/g,
          '<a href="$1" target="_blank" rel="noopener" style="color:#00aff4;">$1</a>',
        );

        return formatted;
      }

      function escapeHtml(text) {
        if (!text) return "";
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      function updateStats() {
        document.getElementById("totalChannels").textContent =
          allChannels.length;
        const totalMessages = allChannels.reduce(
          (sum, ch) => sum + ch.messageCount,
          0,
        );
        document.getElementById("totalMessages").textContent =
          totalMessages.toLocaleString();
      }

      // Event listeners
      document.querySelectorAll(".tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          document
            .querySelectorAll(".tab")
            .forEach((t) => t.classList.remove("active"));
          tab.classList.add("active");
          currentFilter = tab.dataset.filter;
          renderChannelList(allChannels);
        });
      });

      document.getElementById("searchBox").addEventListener("input", () => {
        renderChannelList(allChannels);
      });

      // Initialize
      init();
    </script>
  </body>
</html>
